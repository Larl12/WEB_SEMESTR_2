{% extends 'pages/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="py-5 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <img src="https://placehold.co/900x450?text=Book+Details" class="card-img-top" alt="{{ book.title }}">
                    <div class="card-body p-4">
                        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-start gap-3 mb-3">
                            <h1 class="display-6 mb-0">{{ book.title }}</h1>
                            <a href="{% url 'book_update' book.pk %}" class="btn btn-outline-primary">Редактировать</a>
                        </div>
                        <div class="d-flex flex-wrap gap-2 mb-4">
                            <span class="badge bg-primary">Доступно: {{ book.copies_available }}</span>
                            <span class="badge bg-secondary">Добавлено: {{ book.created_at|date:"d.m.Y H:i" }}</span>
                        </div>
                        <div class="fs-5 lh-lg text-muted mb-4">
                            {{ book.description|linebreaks }}
                        </div>
                        <a href="{% url 'home' %}" class="btn btn-dark">Назад к списку</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
